<title>🍂 新疆十一自驾旅行计划</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#0a0f1a;color:#e2e8f0;overflow:hidden;height:100vh}
.container{display:flex;height:100vh}
.sidebar{width:420px;min-width:420px;background:linear-gradient(180deg,#131a2e 0%,#0a0f1a 100%);overflow-y:auto;z-index:1000;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%;z-index:1;background:#e8e8e8}
.sidebar-header{padding:28px 24px 20px;background:linear-gradient(135deg,#f97316 0%,#dc2626 50%,#f59e0b 100%);flex-shrink:0;position:relative;overflow:hidden}
.sidebar-header h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;position:relative}
.sidebar-header p{font-size:13px;color:rgba(255,255,255,.9);line-height:1.6;position:relative}
.tag-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;position:relative}
.tag{background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px}
.stats-bar{display:flex;padding:16px 24px;gap:8px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;background:rgba(15,23,42,.5)}
.stat{flex:1;text-align:center;padding:8px 0;border-radius:10px;background:rgba(255,255,255,.03)}
.stat-val{font-size:20px;font-weight:700;background:linear-gradient(135deg,#f97316,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:11px;color:#64748b;margin-top:2px}
.day-list{flex:1;overflow-y:auto;padding:12px 0}
.day-list::-webkit-scrollbar{width:4px}
.day-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.day-card{margin:8px 16px;padding:16px 18px;border-radius:14px;background:rgba(30,41,59,.6);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px)}
.day-card:hover{background:rgba(30,41,59,.9);border-color:rgba(255,255,255,.1);transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.day-card.active{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(245,158,11,.08));border-color:rgba(249,115,22,.4)}
.day-card.rest-day{border-left:3px solid #3b82f6}
.day-card.heavy-day{border-left:3px solid #f59e0b}
.day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-num{font-size:11px;font-weight:700;color:#f97316;letter-spacing:1.5px}
.day-date{font-size:11px;color:#64748b}
.day-title{font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:8px;line-height:1.4}
.day-meta{display:flex;gap:16px;font-size:12px;color:#64748b;margin-bottom:8px}
.day-meta span{display:flex;align-items:center;gap:4px}
.day-meta i{font-size:12px;color:#f97316}
.day-highlight{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.day-highlight .spot{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);color:#cbd5e1;padding:4px 10px;border-radius:8px;font-size:11px;border:1px solid rgba(255,255,255,.05)}
.day-warning{margin-top:10px;font-size:11px;color:#fbbf24;background:rgba(251,191,36,.06);padding:8px 12px;border-radius:10px;border:1px solid rgba(251,191,36,.15);line-height:1.6}
.detail-panel{position:absolute;top:16px;right:16px;width:380px;max-height:calc(100vh - 32px);background:rgba(15,23,42,.95);backdrop-filter:blur(20px);border-radius:20px;border:1px solid rgba(255,255,255,.1);box-shadow:0 25px 80px rgba(0,0,0,.5);z-index:1001;overflow:hidden;display:none;animation:slideIn .4s cubic-bezier(.4,0,.2,1)}
.detail-panel.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.detail-hero{width:100%;height:180px;background-size:cover;background-position:center;position:relative}
.detail-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(15,23,42,.95))}
.detail-hero-title{position:absolute;bottom:16px;left:20px;right:60px;z-index:1}
.detail-hero-title h2{font-size:22px;color:#fff;font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.detail-hero-title .sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px}
.detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2}
.detail-close:hover{background:rgba(255,255,255,.2);transform:rotate(90deg)}
.detail-body{padding:20px;max-height:calc(100vh - 250px);overflow-y:auto}
.detail-body::-webkit-scrollbar{width:4px}
.detail-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:12px;color:#f97316;font-weight:600;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.route-box{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 16px;margin-bottom:16px;border:1px solid rgba(255,255,255,.05)}
.route-box .from-to{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#f1f5f9}
.route-box .arrow{color:#f97316;font-size:14px}
.route-box .route-detail{margin-top:10px;display:flex;gap:20px;font-size:13px;color:#94a3b8}
.route-box .route-detail span{display:flex;align-items:center;gap:6px}
.route-box .route-detail i{color:#f97316;font-size:14px}
.spot-card{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;border:1px solid rgba(255,255,255,.05);transition:all .2s}
.spot-card:hover{background:rgba(255,255,255,.06)}
.spot-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.spot-icon.lake{background:rgba(59,130,246,.15)}
.spot-icon.mountain{background:rgba(168,85,247,.15)}
.spot-icon.village{background:rgba(34,197,94,.15)}
.spot-icon.desert{background:rgba(245,158,11,.15)}
.spot-icon.city{background:rgba(99,102,241,.15)}
.spot-icon.grass{background:rgba(16,185,129,.15)}
.spot-info h4{font-size:14px;color:#f1f5f9;font-weight:600;margin-bottom:4px}
.spot-info p{font-size:12px;color:#94a3b8;line-height:1.5}
.hotel-box{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(99,102,241,.03));border:1px solid rgba(59,130,246,.15);border-radius:12px;padding:14px 16px}
.hotel-box h4{font-size:13px;color:#60a5fa;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hotel-box p{font-size:12px;color:#94a3b8;line-height:1.5;margin-bottom:10px}
.hotel-box.booked{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(16,185,129,.03));border:1px solid rgba(34,197,94,.2)}
.hotel-box.booked h4{color:#4ade80}
.hotel-box .booked-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#4ade80;background:rgba(34,197,94,.12);padding:2px 10px;border-radius:10px;font-weight:600;margin-bottom:8px}
.hotel-booked-detail{margin-top:10px}
.hotel-booked-detail .hb-name{font-size:14px;color:#f1f5f9;font-weight:600;margin-bottom:4px}
.hotel-booked-detail .hb-room{font-size:12px;color:#94a3b8;line-height:1.5;margin-bottom:6px}
.hotel-booked-detail .hb-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#60a5fa;text-decoration:none;padding:4px 10px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);transition:all .2s}
.hotel-booked-detail .hb-link:hover{background:rgba(59,130,246,.2)}
.food-box{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.12);border-radius:12px;padding:14px 16px}
.food-box h4{font-size:13px;color:#f87171;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.food-box p{font-size:12px;color:#94a3b8;line-height:1.5}
.custom-marker{position:relative}
.marker-pin{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:transform .2s}
.marker-pin:hover{transform:rotate(-45deg) scale(1.1)}
.marker-pin span{transform:rotate(45deg);font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.map-legend{position:absolute;bottom:24px;left:24px;background:rgba(15,23,42,.9);backdrop-filter:blur(20px);border-radius:14px;padding:16px 20px;border:1px solid rgba(255,255,255,.1);z-index:999}
.map-legend h4{font-size:11px;color:#f97316;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.legend-item{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px;color:#94a3b8}
.legend-line{width:28px;height:3px;border-radius:2px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.weather-strip{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.9);backdrop-filter:blur(20px);border-radius:14px;padding:12px 24px;border:1px solid rgba(255,255,255,.1);z-index:999;display:flex;gap:24px}
.weather-item{text-align:center}
.weather-item .w-icon{font-size:22px}
.weather-item .w-temp{color:#f1f5f9;font-weight:600;margin-top:4px;font-size:14px}
.weather-item .w-loc{color:#64748b;font-size:11px;margin-top:2px}
.tips-panel{position:absolute;bottom:24px;right:24px;width:300px;background:rgba(15,23,42,.9);backdrop-filter:blur(20px);border-radius:14px;padding:16px 20px;border:1px solid rgba(255,255,255,.1);z-index:999}
.tips-panel h4{font-size:11px;color:#f97316;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;display:flex;align-items:center;gap:6px}
.tips-panel ul{font-size:12px;color:#94a3b8;line-height:1.8;padding-left:0;list-style:none}
.tips-panel li{display:flex;align-items:flex-start;gap:8px}
.tips-panel li::before{content:'→';color:#f97316;flex-shrink:0}
.tips-panel strong{color:#4ade80}
.offline-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:600;z-index:9999;display:none;letter-spacing:.5px}
.offline-bar.show{display:block}
.cache-btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:12px 28px;border-radius:30px;font-size:14px;font-weight:600;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(34,197,94,.4);transition:all .3s;display:flex;align-items:center;gap:8px;font-family:'Noto Sans SC',sans-serif}
.cache-btn:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 6px 30px rgba(34,197,94,.5)}
.cache-btn.saved{background:linear-gradient(135deg,#64748b,#475569);box-shadow:0 4px 15px rgba(0,0,0,.3)}

/* ===== 移动端：旅行App风格 ===== */
@media(max-width:768px){
  /* 隐藏桌面端元素 */
  .sidebar{display:none!important}
  .weather-strip{display:none!important}
  .map-legend{display:none!important}
  .tips-panel{display:none!important}
  .cache-btn{display:none!important}

  body{overflow:hidden;height:100vh;height:100dvh;background:#f5f5f5}
  .container{flex-direction:column;height:100vh;height:100dvh}

  /* 地图：顶部35% */
  .map-wrap{height:35vh;min-height:200px;position:relative;z-index:1;flex-shrink:0}
  #map{width:100%;height:100%}

  /* 隐藏桌面端详情面板 */
  .detail-panel{display:none!important}
}

/* ===== 移动端Bottom Sheet ===== */
.m-sheet{display:none}
@media(max-width:768px){
  .m-sheet{
    display:flex;flex-direction:column;
    position:fixed;left:0;right:0;bottom:0;
    height:65vh;height:65dvh;
    background:#ffffff;
    border-radius:20px 20px 0 0;
    z-index:1500;
    box-shadow:0 -4px 30px rgba(0,0,0,.12);
    transition:height .35s cubic-bezier(.32,.72,0,1);
    will-change:height;
  }
  .m-sheet.expanded{height:92vh;height:92dvh;border-radius:0}
  .m-sheet.collapsed{height:52px;border-radius:20px 20px 0 0}
  .m-sheet.collapsed .m-header,
  .m-sheet.collapsed .m-tabs,
  .m-sheet.collapsed .m-content{display:none}
  .m-sheet.collapsed .m-handle{padding:14px 0 10px}

  /* 拖拽手柄 */
  .m-handle{
    flex-shrink:0;padding:10px 0 6px;cursor:grab;
    display:flex;flex-direction:column;align-items:center;
    -webkit-user-select:none;user-select:none;
  }
  .m-handle-bar{width:36px;height:5px;background:rgba(0,0,0,.15);border-radius:3px}

  /* Sheet头部：标题+统计 */
  .m-header{flex-shrink:0;padding:4px 20px 12px}
  .m-header h2{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
  .m-header .m-sub{font-size:12px;color:#888}
  .m-stats{display:flex;gap:12px;margin-top:10px}
  .m-stat{display:flex;align-items:center;gap:4px;font-size:12px;color:#666}
  .m-stat i{color:#f97316;font-size:11px}

  /* 天数Tab栏 */
  .m-tabs{
    flex-shrink:0;
    display:flex;gap:0;
    padding:0 16px;
    overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    border-bottom:1px solid rgba(0,0,0,.06);
  }
  .m-tabs::-webkit-scrollbar{display:none}
  .m-tab{
    flex-shrink:0;
    padding:10px 16px;
    font-size:13px;font-weight:500;
    color:#888;
    cursor:pointer;
    position:relative;
    transition:color .2s;
    white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  .m-tab.active{color:#f97316;font-weight:600}
  .m-tab.active::after{
    content:'';position:absolute;bottom:0;left:16px;right:16px;
    height:3px;background:#f97316;border-radius:2px;
  }

  /* 时间轴内容区 */
  .m-content{
    flex:1;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding:0 0 env(safe-area-inset-bottom,20px);
    position:relative;
  }

  /* 全开时的景点大图展示 */
  .m-hero-showcase{
    height:0;overflow:hidden;
    transition:height .4s cubic-bezier(.32,.72,0,1),opacity .3s;
    opacity:0;position:relative;
  }
  .m-sheet.expanded .m-hero-showcase{height:200px;opacity:1}
  .m-hero-img{
    width:100%;height:200px;object-fit:cover;
    transition:opacity .5s,transform .5s;
    position:absolute;top:0;left:0;
  }
  .m-hero-img.active{opacity:1;transform:scale(1)}
  .m-hero-img.hidden{opacity:0;transform:scale(1.05)}
  .m-hero-overlay{
    position:absolute;bottom:0;left:0;right:0;height:80px;
    background:linear-gradient(transparent,#ffffff);
    z-index:1;
  }
  .m-hero-label{
    position:absolute;bottom:12px;left:16px;z-index:2;
    background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    padding:6px 12px;border-radius:20px;
    font-size:12px;color:#fff;font-weight:500;
    display:flex;align-items:center;gap:6px;
    opacity:0;transition:opacity .3s;
  }
  .m-sheet.expanded .m-hero-label{opacity:1}

  /* 每日标题 */
  .m-day-header{
    padding:16px 20px 8px;
    display:flex;align-items:baseline;gap:8px;
  }
  .m-day-header h3{font-size:16px;font-weight:700;color:#1a1a1a}
  .m-day-header .m-date{font-size:12px;color:#888}

  /* 路线摘要 */
  .m-route{
    margin:0 16px 12px;padding:12px 16px;
    background:rgba(249,115,22,.06);
    border:1px solid rgba(249,115,22,.12);
    border-radius:12px;
    display:flex;align-items:center;gap:12px;
    font-size:13px;color:#333;
  }
  .m-route i{color:#f97316;font-size:14px}
  .m-route .m-km{color:#f97316;font-weight:600}

  /* 时间轴 */
  .m-timeline{padding:0 16px 16px 16px}

  /* 时间轴节点 */
  .m-node{display:flex;gap:12px;position:relative;padding-bottom:4px}
  .m-node:last-child{padding-bottom:0}

  /* 时间轴线+点 */
  .m-axis{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;position:relative}
  .m-dot{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#fff;
    flex-shrink:0;z-index:1;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  .m-line{width:2px;flex:1;background:rgba(0,0,0,.08);margin-top:4px}
  .m-node:last-child .m-line{display:none}

  /* 节点内容卡片 */
  .m-card{
    flex:1;
    background:#f8f8f8;
    border:1px solid rgba(0,0,0,.04);
    border-radius:14px;
    padding:14px;
    margin-bottom:8px;
    cursor:pointer;
    transition:transform .15s,background .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .m-card:active{transform:scale(.98);background:#f0f0f0}
  .m-card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
  .m-card-desc{font-size:12px;color:#666;line-height:1.5}

  /* 全开时卡片更丰富 */
  .m-sheet.expanded .m-card{
    background:#fff;border:1px solid rgba(0,0,0,.06);
    box-shadow:0 2px 12px rgba(0,0,0,.06);
    padding:16px;
  }
  .m-sheet.expanded .m-card-title{font-size:16px}
  .m-sheet.expanded .m-card-desc{font-size:13px;color:#555}

  /* 全开时路线卡片更突出 */
  .m-sheet.expanded .m-route{
    background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.15);
    padding:14px 18px;font-size:14px;
    box-shadow:0 2px 12px rgba(249,115,22,.08);
  }
  .m-card-tag{
    display:inline-flex;align-items:center;gap:4px;
    margin-top:6px;padding:3px 8px;
    background:rgba(0,0,0,.04);border-radius:6px;
    font-size:11px;color:#888;
  }
  .m-card-tag i{font-size:10px;color:#f97316}

  /* 酒店/美食信息卡 */
  .m-info-card{
    flex:1;
    border-radius:14px;padding:14px;
    margin-bottom:8px;
  }
  .m-info-card.hotel{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15)}
  .m-info-card.food{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.12)}
  .m-info-card .m-info-label{
    font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
    margin-bottom:6px;display:flex;align-items:center;gap:5px;
  }

// ===== Bottom Sheet 交互 (Apple HIG 风格) =====
(function(){
  const panel=document.getElementById('detailPanel');
  let startY=0,currentY=0,dragging=false,sheetHeight=0;

  // 创建遮罩层
  const backdrop=document.createElement('div');
  backdrop.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1999;opacity:0;transition:opacity .3s ease;pointer-events:none;display:none';
  document.body.appendChild(backdrop);
  backdrop.addEventListener('click',()=>closeDetail());

  // 打开面板
  window.openDetail=function(){
    panel.classList.add('show');
    backdrop.style.display='block';
    requestAnimationFrame(()=>{backdrop.style.opacity='1'});
    if(window.innerWidth<=768){
      document.body.style.overflow='hidden';
      document.body.style.position='fixed';
      document.body.style.width='100%';
    }
  };

  // 关闭面板
  window.closeDetail=function(){
    panel.classList.remove('show');
    backdrop.style.opacity='0';
    setTimeout(()=>{backdrop.style.display='none'},300);
    document.body.style.overflow='';
    document.body.style.position='';
    document.body.style.width='';
  };

  // 触摸拖拽：面板跟随手指
  panel.addEventListener('touchstart',e=>{
    // 如果详情内容区还在滚动顶部，不拦截
    const detailBody=panel.querySelector('.detail-body');
    if(detailBody&&detailBody.scrollTop>5)return;
    startY=e.touches[0].clientY;
    sheetHeight=panel.offsetHeight;
    dragging=true;
    panel.style.transition='none';
  },{passive:true});

  panel.addEventListener('touchmove',e=>{
    if(!dragging)return;
    currentY=e.touches[0].clientY;
    const dy=currentY-startY;
    if(dy<0)return; // 只允许下拉
    // 阻尼效果：越往下拖越难拖
    const resistance=dy<sheetHeight*.4?dy:dy*.3+sheetHeight*.4*.7;
    panel.style.transform=`translateY(${resistance}px)`;
    // 遮罩跟随变淡
    const progress=1-Math.min(resistance/sheetHeight,1);
    backdrop.style.opacity=String(progress*.5);
  },{passive:true});

  panel.addEventListener('touchend',()=>{
    if(!dragging)return;
    dragging=false;
    panel.style.transition='';
    const dy=currentY-startY;
    // 快速下滑（velocity大）或拖拽超过40% → 关闭
    if(dy>80||dy>sheetHeight*.35){
      closeDetail();
    }else{
      // 回弹
      panel.style.transform='';
      backdrop.style.opacity='1';
    }
  },{passive:true});

  // 暴露给外部使用
  window.showDetailPanel=function(d){
    const spotsHTML=d.spots.map(s=>`<div class="spot-card"><div class="spot-icon ${s.type}">${s.icon}</div><div class="spot-info"><h4>${s.name}</h4><p>${s.desc}</p></div></div>`).join('');
    let hotelRecHTML='';
    if(d.hotelBooked){
      hotelRecHTML=`<div class="hotel-booked-detail"><div class="hb-name">${d.hotelBooked.name}</div><div class="hb-room">🛏️ ${d.hotelBooked.room}</div></div>`;
    }
    panel.innerHTML=`
      <div class="detail-hero" style="background-image:url('${d.image}')">
        <div class="detail-hero-title"><h2>${d.title}</h2><div class="sub">${d.day} · ${d.date}</div></div>
        <button class="detail-close" onclick="closeDetail()"><i class="fas fa-times"></i></button>
      </div>
      <div class="detail-body">
        ${d.route.km!=='—'?`<div class="route-box"><div class="from-to"><span>${d.route.from}</span><span class="arrow"><i class="fas fa-arrow-right"></i></span><span>${d.route.to}</span></div><div class="route-detail"><span><i class="fas fa-road"></i> ${d.route.km}</span><span><i class="fas fa-clock"></i> ${d.route.hours}</span></div>${d.route.highway?`<div style="margin-top:8px;font-size:12px;color:#94a3b8"><i class="fas fa-route" style="color:#f97316;margin-right:6px"></i>${d.route.highway}</div>`:''}</div>`:''}
        <div class="detail-section"><h3><i class="fas fa-map-marked-alt"></i> 景点亮点</h3>${spotsHTML}</div>
        <div class="detail-section"><div class="hotel-box${d.hotelBooked?' booked':''}"><h4><i class="fas fa-hotel"></i> ${d.hotelBooked?'已定酒店':'住宿推荐'}</h4>${d.hotelBooked?'<span class="booked-badge"><i class="fas fa-check-circle"></i> 已预订</span>':''}<p>${d.hotel}</p>${hotelRecHTML}</div></div>
        <div class="detail-section"><div class="food-box"><h4><i class="fas fa-utensils"></i> 美食推荐</h4><p>${d.food||'当地特色美食'}</p></div></div>
        ${d.tips?`<div class="detail-section"><h3><i class="fas fa-exclamation-triangle"></i> 温馨提示</h3><p style="color:#fbbf24;font-size:13px;line-height:1.8">${d.tips}</p></div>`:''}
      </div>`;
    openDetail();
  };
})();

    function getState(){
      if(sheet.classList.contains('expanded'))return 'expanded';
      if(sheet.classList.contains('collapsed'))return 'collapsed';
      return 'peek';
    }
    function setState(s){
      sheet.classList.remove('expanded','collapsed');
      if(s==='expanded')sheet.classList.add('expanded');
      if(s==='collapsed')sheet.classList.add('collapsed');
      state=s;
    }

    // 所有手势从 handle 或 content 区域触发
    function onTouchStart(e){
      // 如果内容区在滚动中且不在顶部，不拦截
      if(e.target.closest('.m-content')&&content.scrollTop>5)return;
      startY=e.touches[0].clientY;
      dragging=true;
      state=getState();
      sheet.style.transition='none';
    }
    function onTouchMove(e){
      if(!dragging)return;
      const dy=e.touches[0].clientY-startY;
      const vh=window.innerHeight;
      const peekH=vh*.65;
      const expandedH=vh*.92;
      const collapsedH=52;

      if(state==='collapsed'){
        // 收起态：只能上拉到peek
        if(dy<0){
          const h=Math.min(peekH,collapsedH+Math.abs(dy));
          sheet.style.height=h+'px';
        }
      }else if(state==='peek'){
        // 半开态：上拉到expanded，下拉到collapsed
        if(dy<0){
          const h=Math.min(expandedH,peekH+Math.abs(dy)*.6);
          sheet.style.height=h+'px';
        }else{
          const h=Math.max(collapsedH,peekH-dy*.6);
          sheet.style.height=h+'px';
        }
      }else{
        // 全开态：只能下拉到peek
        if(dy>0){
          const h=Math.max(peekH,expandedH-dy*.6);
          sheet.style.height=h+'px';
        }
      }
    }
    function onTouchEnd(e){
      if(!dragging)return;
      dragging=false;
      sheet.style.transition='';
      sheet.style.height='';
      const dy=e.changedTouches[0].clientY-startY;
      const threshold=50;

      if(state==='collapsed'){
        if(dy<-threshold)setState('peek');
      }else if(state==='peek'){
        if(dy<-threshold)setState('expanded');
        else if(dy>threshold)setState('collapsed');
      }else{
        if(dy>threshold)setState('peek');
      }
    }

    handle.addEventListener('touchstart',onTouchStart,{passive:true});
    handle.addEventListener('touchmove',onTouchMove,{passive:true});
    handle.addEventListener('touchend',onTouchEnd,{passive:true});
    content.addEventListener('touchstart',onTouchStart,{passive:true});
    content.addEventListener('touchmove',onTouchMove,{passive:true});
    content.addEventListener('touchend',onTouchEnd,{passive:true});

    // 点击手柄切换
    handle.addEventListener('click',()=>{
      const s=getState();
      if(s==='collapsed')setState('peek');
      else if(s==='peek')setState('expanded');
      else setState('collapsed');
    });
  })();

  // 详情面板拖拽关闭
  (function(){
    let startY=0,dragging=false;
    detailPanel.addEventListener('touchstart',e=>{
      if(detailBody.scrollTop>5)return;
      startY=e.touches[0].clientY;dragging=true;
      detailPanel.style.transition='none';
    },{passive:true});
    detailPanel.addEventListener('touchmove',e=>{
      if(!dragging)return;
      const dy=e.touches[0].clientY-startY;
      if(dy>0)detailPanel.style.transform=`translateY(${dy}px)`;
    },{passive:true});
    detailPanel.addEventListener('touchend',e=>{
      if(!dragging)return;
      dragging=false;
      detailPanel.style.transition='';
      const dy=e.changedTouches[0].clientY-startY;
      if(dy>100)closeMobileDetail();
      else detailPanel.style.transform='';
    },{passive:true});
  })();

  // 初始化第一天
  renderDay(0);
  updateHeroImage(0);
  highlightMarker(0);
})();

// === PWA 离线缓存 ===
// 方式1: Service Worker（推荐，HTTP/HTTPS 下可用）
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='xinjiang-trip-v1';
    const ASSETS=['./','https://unpkg.com/leaflet@1.9.4/dist/leaflet.css','https://unpkg.com/leaflet@1.9.4/dist/leaflet.js','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()))});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone))}return res}).catch(()=>caches.match('./'))))});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(()=>{});
}

// 方式2: localStorage 兜底（微信/小程序/浏览器都能用）
try{
  const html=document.documentElement.outerHTML;
  localStorage.setItem('xinjiang_trip_cache',html);
  localStorage.setItem('xinjiang_trip_cache_time',Date.now());
}catch(e){}
// 离线时如果网络请求失败，尝试从缓存恢复
window.addEventListener('load',()=>{
  if(!navigator.onLine){
    const cached=localStorage.getItem('xinjiang_trip_cache');
    if(cached&&document.documentElement.outerHTML.length<1000){
      document.open();document.write(cached);document.close();
    }
  }
});

// 离线状态提示
function updateOnlineStatus(){
  const bar=document.getElementById('offlineBar');
  if(bar) bar.classList.toggle('show',!navigator.onLine);
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);
updateOnlineStatus();

// 手动保存到手机（点击按钮触发）
function saveOffline(){
  try{
    const html=document.documentElement.outerHTML;
    localStorage.setItem('xinjiang_trip_cache',html);
    localStorage.setItem('xinjiang_trip_cache_time',new Date().toLocaleString('zh-CN'));
    const btn=document.getElementById('cacheBtn');
    btn.classList.add('saved');
    btn.innerHTML='<i class="fas fa-check"></i> <span>已保存！断网也能看</span>';
    setTimeout(()=>{btn.style.opacity='0';btn.style.pointerEvents='none'},2000);
  }catch(e){
    alert('保存失败，请尝试用浏览器打开后保存');
  }
}

// 检查是否已缓存，更新按钮状态
(function(){
  const cached=localStorage.getItem('xinjiang_trip_cache');
  const cacheTime=localStorage.getItem('xinjiang_trip_cache_time');
  if(cached&&cacheTime){
    const btn=document.getElementById('cacheBtn');
    if(btn){
      btn.classList.add('saved');
      btn.innerHTML=`<i class="fas fa-check"></i> <span>已保存 (${cacheTime})</span>`;
    }
  }
})();
</script>
