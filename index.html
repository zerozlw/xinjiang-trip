<title>🍂 新疆十一自驾旅行计划</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
body{font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;background:#f0f7ff;color:#e2e8f0;overflow:hidden;height:100vh}
.container{display:flex;height:100vh;background:#f0f7ff}
.sidebar{width:420px;min-width:420px;background:linear-gradient(180deg,#131a2e 0%,#0a0f1a 100%);overflow-y:auto;z-index:1000;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%;z-index:1;background:#e8e8e8}
.sidebar-header{padding:28px 24px 20px;background:linear-gradient(135deg,#f97316 0%,#dc2626 50%,#f59e0b 100%);flex-shrink:0;position:relative;overflow:hidden}
.sidebar-header h1{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px;position:relative}
.sidebar-header p{font-size:13px;color:rgba(255,255,255,.9);line-height:1.6;position:relative}
.tag-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;position:relative}
.tag{background:rgba(255,255,255,.2);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px}
.stats-bar{display:flex;padding:16px 24px;gap:8px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;background:rgba(15,23,42,.5)}
.stat{flex:1;text-align:center;padding:8px 0;border-radius:10px;background:rgba(255,255,255,.03)}
.stat-val{font-size:20px;font-weight:700;background:linear-gradient(135deg,#f97316,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:11px;color:#64748b;margin-top:2px}
.day-list{flex:1;overflow-y:auto;padding:12px 0}
.day-list::-webkit-scrollbar{width:4px}
.day-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.day-card{margin:8px 16px;padding:16px 18px;border-radius:14px;background:rgba(30,41,59,.6);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px)}
.day-card:hover{background:rgba(30,41,59,.9);border-color:rgba(255,255,255,.1);transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.day-card.active{background:linear-gradient(135deg,rgba(249,115,22,.15),rgba(245,158,11,.08));border-color:rgba(249,115,22,.4)}
.day-card.rest-day{border-left:3px solid #3b82f6}
.day-card.heavy-day{border-left:3px solid #f59e0b}
.day-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-num{font-size:11px;font-weight:700;color:#f97316;letter-spacing:1.5px}
.day-date{font-size:11px;color:#64748b}
.day-title{font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:8px;line-height:1.4}
.day-meta{display:flex;gap:16px;font-size:12px;color:#64748b;margin-bottom:8px}
.day-meta span{display:flex;align-items:center;gap:4px}
.day-meta i{font-size:12px;color:#f97316}
.day-highlight{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.day-highlight .spot{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.06);color:#cbd5e1;padding:4px 10px;border-radius:8px;font-size:11px;border:1px solid rgba(255,255,255,.05)}
.day-warning{margin-top:10px;font-size:11px;color:#fbbf24;background:rgba(251,191,36,.06);padding:8px 12px;border-radius:10px;border:1px solid rgba(251,191,36,.15);line-height:1.6}
.detail-panel{position:absolute;top:16px;right:16px;width:380px;max-height:calc(100vh - 32px);background:rgba(15,23,42,.95);backdrop-filter:blur(20px);border-radius:20px;border:1px solid rgba(255,255,255,.1);box-shadow:0 25px 80px rgba(0,0,0,.5);z-index:1001;overflow:hidden;display:none;animation:slideIn .4s cubic-bezier(.4,0,.2,1)}
.detail-panel.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.detail-hero{width:100%;height:180px;background-size:cover;background-position:center;position:relative}
.detail-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(15,23,42,.95))}
.detail-hero-title{position:absolute;bottom:16px;left:20px;right:60px;z-index:1}
.detail-hero-title h2{font-size:22px;color:#fff;font-weight:700;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.detail-hero-title .sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:4px}
.detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2}
.detail-close:hover{background:rgba(255,255,255,.2);transform:rotate(90deg)}
.detail-body{padding:20px;max-height:calc(100vh - 250px);overflow-y:auto}
.detail-body::-webkit-scrollbar{width:4px}
.detail-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.detail-section{margin-bottom:20px}
.detail-section h3{font-size:12px;color:#f97316;font-weight:600;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.route-box{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 16px;margin-bottom:16px;border:1px solid rgba(255,255,255,.05)}
.route-box .from-to{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#f1f5f9}
.route-box .arrow{color:#f97316;font-size:14px}
.route-box .route-detail{margin-top:10px;display:flex;gap:20px;font-size:13px;color:#94a3b8}
.route-box .route-detail span{display:flex;align-items:center;gap:6px}
.route-box .route-detail i{color:#f97316;font-size:14px}
.spot-card{background:rgba(255,255,255,.03);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;border:1px solid rgba(255,255,255,.05);transition:all .2s}
.spot-card:hover{background:rgba(255,255,255,.06)}
.spot-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.spot-icon.lake{background:rgba(59,130,246,.15)}
.spot-icon.mountain{background:rgba(168,85,247,.15)}
.spot-icon.village{background:rgba(34,197,94,.15)}
.spot-icon.desert{background:rgba(245,158,11,.15)}
.spot-icon.city{background:rgba(99,102,241,.15)}
.spot-icon.grass{background:rgba(16,185,129,.15)}
.spot-info h4{font-size:14px;color:#f1f5f9;font-weight:600;margin-bottom:4px}
.spot-info p{font-size:12px;color:#94a3b8;line-height:1.5}
.hotel-box{background:linear-gradient(135deg,rgba(59,130,246,.06),rgba(99,102,241,.03));border:1px solid rgba(59,130,246,.15);border-radius:12px;padding:14px 16px}
.hotel-box h4{font-size:13px;color:#60a5fa;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hotel-box p{font-size:12px;color:#94a3b8;line-height:1.5;margin-bottom:10px}
.hotel-box.booked{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(16,185,129,.03));border:1px solid rgba(34,197,94,.2)}
.hotel-box.booked h4{color:#4ade80}
.hotel-box .booked-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#4ade80;background:rgba(34,197,94,.12);padding:2px 10px;border-radius:10px;font-weight:600;margin-bottom:8px}
.hotel-booked-detail{margin-top:10px}
.hotel-booked-detail .hb-name{font-size:14px;color:#f1f5f9;font-weight:600;margin-bottom:4px}
.hotel-booked-detail .hb-room{font-size:12px;color:#94a3b8;line-height:1.5;margin-bottom:6px}
.hotel-booked-detail .hb-link{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#60a5fa;text-decoration:none;padding:4px 10px;border-radius:8px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);transition:all .2s}
.hotel-booked-detail .hb-link:hover{background:rgba(59,130,246,.2)}
.food-box{background:rgba(239,68,68,.04);border:1px solid rgba(239,68,68,.12);border-radius:12px;padding:14px 16px}
.food-box h4{font-size:13px;color:#f87171;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.food-box p{font-size:12px;color:#94a3b8;line-height:1.5}
.custom-marker{position:relative}
.marker-pin{width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:transform .2s}
.marker-pin:hover{transform:rotate(-45deg) scale(1.1)}
.marker-pin span{transform:rotate(45deg);font-size:14px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.map-legend{position:absolute;bottom:24px;left:24px;background:rgba(15,23,42,.9);backdrop-filter:blur(20px);border-radius:14px;padding:16px 20px;border:1px solid rgba(255,255,255,.1);z-index:999}
.map-legend h4{font-size:11px;color:#f97316;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.legend-item{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px;color:#94a3b8}
.legend-line{width:28px;height:3px;border-radius:2px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.weather-strip{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.9);backdrop-filter:blur(20px);border-radius:14px;padding:12px 24px;border:1px solid rgba(255,255,255,.1);z-index:999;display:flex;gap:24px}
.weather-item{text-align:center}
.weather-item .w-icon{font-size:22px}
.weather-item .w-temp{color:#f1f5f9;font-weight:600;margin-top:4px;font-size:14px}
.weather-item .w-loc{color:#64748b;font-size:11px;margin-top:2px}
.tips-panel{position:absolute;bottom:24px;right:24px;width:300px;background:rgba(15,23,42,.9);backdrop-filter:blur(20px);border-radius:14px;padding:16px 20px;border:1px solid rgba(255,255,255,.1);z-index:999}
.tips-panel h4{font-size:11px;color:#f97316;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;display:flex;align-items:center;gap:6px}
.tips-panel ul{font-size:12px;color:#94a3b8;line-height:1.8;padding-left:0;list-style:none}
.tips-panel li{display:flex;align-items:flex-start;gap:8px}
.tips-panel li::before{content:'→';color:#f97316;flex-shrink:0}
.tips-panel strong{color:#4ade80}
.offline-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;text-align:center;padding:8px;font-size:12px;font-weight:600;z-index:9999;display:none;letter-spacing:.5px}
.offline-bar.show{display:block}
.cache-btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:12px 28px;border-radius:30px;font-size:14px;font-weight:600;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(34,197,94,.4);transition:all .3s;display:flex;align-items:center;gap:8px;font-family:'Noto Sans SC',sans-serif}
.cache-btn:hover{transform:translateX(-50%) scale(1.05);box-shadow:0 6px 30px rgba(34,197,94,.5)}
.cache-btn.saved{background:linear-gradient(135deg,#64748b,#475569);box-shadow:0 4px 15px rgba(0,0,0,.3)}

/* ===== 移动端：C端旅行App风格（蓝绿色调）===== */
@media(max-width:768px){
  .sidebar{display:none!important}
  .weather-strip{display:none!important}
  .map-legend{display:none!important}
  .tips-panel{display:none!important}
  .cache-btn{display:none!important}
  body{overflow:hidden;height:100vh;height:100dvh;background:#f0f7ff}
  .container{flex-direction:column;height:100vh;height:100dvh;background:#f0f7ff}
  .map-wrap{height:35vh;min-height:200px;position:relative;z-index:1;flex-shrink:0}
  #map{width:100%;height:100%}
  .detail-panel{display:none!important;opacity:0!important;visibility:hidden!important;pointer-events:none!important}
}

.m-sheet{display:none}
@media(max-width:768px){
  .m-sheet{
    display:flex;flex-direction:column;
    position:fixed;left:0;right:0;bottom:0;
    height:65vh;height:65dvh;
    background:#f8fbff;
    border-radius:24px 24px 0 0;
    z-index:1500;
    box-shadow:0 -6px 40px rgba(0,120,200,.1);
    transition:height .4s cubic-bezier(.32,.72,0,1);
    will-change:height;
  }
  .m-sheet.expanded{height:92vh;height:92dvh;border-radius:24px 24px 0 0}
  .m-sheet.collapsed{height:52px;border-radius:24px 24px 0 0}
  .m-sheet.collapsed .m-header,
  .m-sheet.collapsed .m-tabs,
  .m-sheet.collapsed .m-hero-showcase,
  .m-sheet.collapsed .m-content{display:none}
  .m-sheet.collapsed .m-handle{padding:14px 0 10px}

  /* 拖拽手柄 */
  .m-handle{
    flex-shrink:0;padding:10px 0 6px;cursor:grab;
    display:flex;flex-direction:column;align-items:center;
    -webkit-user-select:none;user-select:none;
  }
  .m-handle-bar{width:40px;height:5px;background:rgba(0,120,200,.15);border-radius:3px}

  /* Sheet头部 */
  .m-header{flex-shrink:0;padding:4px 20px 14px}
  .m-header h2{font-size:20px;font-weight:700;color:#0a2540;margin-bottom:2px}
  .m-header .m-sub{font-size:13px;color:#7c8db5}
  .m-stats{display:flex;gap:14px;margin-top:10px}
  .m-stat{display:flex;align-items:center;gap:5px;font-size:12px;color:#5a6f8c}
  .m-stat i{color:#0ea5e9;font-size:11px}

  /* ===== 天数Tab栏（卡片式，参考携程/高德）===== */
  .m-tabs{
    flex-shrink:0;
    display:flex;gap:10px;
    padding:8px 16px 12px;
    overflow-x:auto;overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .m-tabs::-webkit-scrollbar{display:none}
  .m-tab{
    flex-shrink:0;
    display:flex;align-items:center;gap:8px;
    padding:8px 14px 8px 10px;
    background:#fff;
    border:2px solid #e8f0fe;
    border-radius:14px;
    font-size:13px;font-weight:600;
    color:#5a6f8c;
    cursor:pointer;
    transition:all .25s;
    white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
    box-shadow:0 1px 4px rgba(0,120,200,.06);
  }
  .m-tab .m-tab-thumb{
    width:36px;height:36px;border-radius:10px;
    object-fit:cover;flex-shrink:0;
    background:#e8f0fe;
  }
  .m-tab .m-tab-info{display:flex;flex-direction:column;line-height:1.2}
  .m-tab .m-tab-day{font-size:13px;font-weight:700;color:#0a2540}
  .m-tab .m-tab-label{font-size:10px;color:#7c8db5;font-weight:400}
  .m-tab.active{
    background:linear-gradient(135deg,#0ea5e9,#06b6d4);
    border-color:transparent;
    box-shadow:0 4px 16px rgba(14,165,233,.3);
    color:#fff;
  }
  .m-tab.active .m-tab-day{color:#fff}
  .m-tab.active .m-tab-label{color:rgba(255,255,255,.8)}
  .m-tab.active .m-tab-thumb{border:2px solid rgba(255,255,255,.4)}

  /* 时间轴内容区 */
  .m-content{
    flex:1;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding:0 0 env(safe-area-inset-bottom,20px);
    position:relative;
  }

  /* 景点大图（全开时显示，跟着内容一起滚） */
  .m-hero-showcase{
    height:0;overflow:hidden;opacity:0;position:relative;
    transition:height .4s cubic-bezier(.32,.72,0,1),opacity .3s;
  }
  .m-sheet.expanded .m-hero-showcase{height:200px;opacity:1}
  .m-hero-img{
    width:100%;height:200px;object-fit:cover;
    transition:opacity .5s,transform .5s;
    position:absolute;top:0;left:0;
  }
  .m-hero-img.active{opacity:1;transform:scale(1)}
  .m-hero-img.hidden{opacity:0;transform:scale(1.05)}
  .m-hero-overlay{
    position:absolute;bottom:0;left:0;right:0;height:80px;
    background:linear-gradient(transparent,#f8fbff);
    z-index:1;
  }
  .m-hero-label{
    position:absolute;bottom:12px;left:16px;z-index:2;
    background:rgba(14,165,233,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    padding:6px 14px;border-radius:20px;
    font-size:12px;color:#fff;font-weight:600;
    display:flex;align-items:center;gap:6px;
    opacity:0;transition:opacity .3s;
  }
  .m-sheet.expanded .m-hero-label{opacity:1}

  /* 每日标题 */
  .m-day-header{
    padding:16px 20px 8px;
    display:flex;align-items:baseline;gap:8px;
  }
  .m-day-header h3{font-size:17px;font-weight:700;color:#0a2540}
  .m-day-header .m-date{font-size:12px;color:#7c8db5}

  /* 路线摘要 */
  .m-route{
    margin:0 16px 12px;padding:12px 16px;
    background:linear-gradient(135deg,rgba(14,165,233,.06),rgba(6,182,212,.04));
    border:1px solid rgba(14,165,233,.12);
    border-radius:14px;
    display:flex;align-items:center;gap:12px;
    font-size:13px;color:#334155;
  }
  .m-route i{color:#0ea5e9;font-size:14px}
  .m-route .m-km{color:#0ea5e9;font-weight:700}

  /* 时间轴 */
  .m-timeline{padding:0 16px 16px 16px}
  .m-node{display:flex;gap:12px;position:relative;padding-bottom:4px}
  .m-node:last-child{padding-bottom:0}

  /* 时间轴线+点 */
  .m-axis{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;position:relative}
  .m-dot{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:#fff;
    flex-shrink:0;z-index:1;
    background:linear-gradient(135deg,#0ea5e9,#06b6d4);
    box-shadow:0 2px 10px rgba(14,165,233,.3);
  }
  .m-line{width:2px;flex:1;background:rgba(14,165,233,.12);margin-top:4px}
  .m-node:last-child .m-line{display:none}

  /* 节点内容卡片 */
  .m-card{
    flex:1;
    background:#fff;
    border:1px solid #e8f0fe;
    border-radius:16px;
    padding:14px;
    margin-bottom:8px;
    cursor:pointer;
    transition:transform .15s,box-shadow .2s;
    -webkit-tap-highlight-color:transparent;
    box-shadow:0 1px 6px rgba(0,120,200,.04);
    display:flex;gap:12px;align-items:flex-start;
  }
  .m-card:active{transform:scale(.98);box-shadow:0 0 0 rgba(0,0,0,0)}
  .m-card-img{
    width:64px;height:64px;border-radius:12px;object-fit:cover;flex-shrink:0;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
  }
  .m-card-text{flex:1;min-width:0}
  .m-card-title{font-size:15px;font-weight:600;color:#0a2540;margin-bottom:3px}
  .m-card-desc{font-size:12px;color:#7c8db5;line-height:1.5}
  .m-card-tag{
    display:inline-flex;align-items:center;gap:4px;
    margin-top:8px;padding:4px 10px;
    background:rgba(14,165,233,.06);border-radius:8px;
    font-size:11px;color:#0ea5e9;font-weight:500;
  }

// ===== Bottom Sheet 交互 (Apple HIG 风格) =====
(function(){
  const panel=document.getElementById('detailPanel');
  const isMobile=window.innerWidth<=768;
  let startY=0,currentY=0,dragging=false,sheetHeight=0;

  // 只在桌面端创建遮罩层
  let backdrop=null;
  if(!isMobile){
    backdrop=document.createElement('div');
    backdrop.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1999;opacity:0;transition:opacity .3s ease;pointer-events:none;display:none';
    document.body.appendChild(backdrop);
    backdrop.addEventListener('click',()=>closeDetail());
  }

  // 打开面板
  window.openDetail=function(){
    if(isMobile)return; // 移动端不使用桌面面板
    panel.classList.add('show');
    if(backdrop){
      backdrop.style.display='block';
      requestAnimationFrame(()=>{backdrop.style.opacity='1'});
    }
  };

  // 关闭面板
  window.closeDetail=function(){
    panel.classList.remove('show');
    if(backdrop){
      backdrop.style.opacity='0';
      setTimeout(()=>{backdrop.style.display='none'},300);
    }
    document.body.style.overflow='';
    document.body.style.position='';
    document.body.style.width='';
  };

  // 触摸拖拽：面板跟随手指
  panel.addEventListener('touchstart',e=>{
    // 如果详情内容区还在滚动顶部，不拦截
    const detailBody=panel.querySelector('.detail-body');
    if(detailBody&&detailBody.scrollTop>5)return;
    startY=e.touches[0].clientY;
    sheetHeight=panel.offsetHeight;
    dragging=true;
    panel.style.transition='none';
  },{passive:true});

  panel.addEventListener('touchmove',e=>{
    if(!dragging)return;
    currentY=e.touches[0].clientY;
    const dy=currentY-startY;
    if(dy<0)return; // 只允许下拉
    // 阻尼效果：越往下拖越难拖
    const resistance=dy<sheetHeight*.4?dy:dy*.3+sheetHeight*.4*.7;
    panel.style.transform=`translateY(${resistance}px)`;
    // 遮罩跟随变淡
    const progress=1-Math.min(resistance/sheetHeight,1);
    backdrop.style.opacity=String(progress*.5);
  },{passive:true});

  panel.addEventListener('touchend',()=>{
    if(!dragging)return;
    dragging=false;
    panel.style.transition='';
    const dy=currentY-startY;
    // 快速下滑（velocity大）或拖拽超过40% → 关闭
    if(dy>80||dy>sheetHeight*.35){
      closeDetail();
    }else{
      // 回弹
      panel.style.transform='';
      backdrop.style.opacity='1';
    }
  },{passive:true});

  // 暴露给外部使用
  window.showDetailPanel=function(d){
    // 移动端不触发桌面端的openDetail（会创建暗色遮罩）
  };
})();

// 移动端：侧边栏和地图之间可拖拽分隔（上下布局时）
(function(){
  if(window.innerWidth>768)return;
  const mapWrap=document.querySelector('.map-wrap');
  const sidebar=document.querySelector('.sidebar');
  let touchStartY=0,touchStartHeight=0;
  mapWrap.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    touchStartY=e.touches[0].clientY;
    touchStartHeight=parseInt(getComputedStyle(mapWrap).height);
  },{passive:true});
  mapWrap.addEventListener('touchmove',e=>{
    if(!touchStartY)return;
    const dy=touchStartY-e.touches[0].clientY;
    const newH=Math.max(150,Math.min(window.innerHeight*0.8,touchStartHeight+dy));
    mapWrap.style.height=newH+'px';
    sidebar.style.height=(window.innerHeight-newH)+'px';
    map.invalidateSize();
  },{passive:true});
  mapWrap.addEventListener('touchend',()=>{touchStartY=0},{passive:true});
})();

setTimeout(()=>{document.querySelector('.day-card').click();},500);

// ===== 移动端UI =====
(function(){
  if(window.innerWidth>768)return;

  const tabsEl=document.getElementById('mTabs');
  const contentEl=document.getElementById('mContent');
  const sheet=document.getElementById('mSheet');
  const overlay=document.getElementById('mDetailOverlay');
  const detailPanel=document.getElementById('mDetailPanel');
  const detailHero=document.getElementById('mDetailHero');
  const detailHeroInfo=document.getElementById('mDetailHeroInfo');
  const detailBody=document.getElementById('mDetailBody');
  const detailClose=document.getElementById('mDetailClose');

  let activeDay=0;

  // 渲染Tab栏（带缩略图）
  days.forEach((d,i)=>{
    const tab=document.createElement('div');
    tab.className='m-tab'+(i===0?' active':'');
    tab.innerHTML=`
      <img class="m-tab-thumb" src="${d.image}" alt="" loading="lazy">
      <div class="m-tab-info">
        <span class="m-tab-day">${d.day}</span>
        <span class="m-tab-label">${d.spots.length}个景点</span>
      </div>`;
    tab.addEventListener('click',()=>switchDay(i));
    tabsEl.appendChild(tab);
  });

  // 切换天数
  function switchDay(idx){
    activeDay=idx;
    contentEl.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
    contentEl.style.transform='';
    setTimeout(()=>{contentEl.style.transition='';},300);

    document.querySelectorAll('.m-tab').forEach((t,i)=>{
      t.classList.toggle('active',i===idx);
    });
    const tab=tabsEl.children[idx];
    if(tab)tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    contentEl.scrollTop=0;
    renderDay(idx);
    updateHeroImage(idx);
    highlightMarker(idx);
    showDaySpots(idx);
    const d=days[idx];
    if(!d||!window.map)return;

    // 半开时地图往上偏移（避免被sheet遮挡）
    const sheet=document.getElementById('mSheet');
    const isExpanded=sheet&&sheet.classList.contains('expanded');
    const vh=window.innerHeight;
    if(isExpanded){
      // 全开：地图全屏，正常居中
      window.map.flyTo(d.coord,8,{duration:1});
    }else{
      // 半开/收起：地图只露上面35-40%，偏移中心
      const offset=vh*0.18/vh; // 约0.18度偏移
      window.map.flyTo([d.coord[0]+offset,d.coord[1]],8,{duration:1});
    }
  }

  // 切换Tab时：只显示当天标记，同坐标的其他标记隐藏
  function highlightMarker(idx){
    const activeCoord=days[idx].coord.join(',');
    markers.forEach((m,i)=>{
      const el=m.getElement();
      if(!el)return;
      const bubble=el.querySelector('.marker-bubble');
      if(!bubble)return;
      const mCoord=m.getLatLng().lat.toFixed(4)+','+m.getLatLng().lng.toFixed(4);
      bubble.classList.remove('marker-dimmed','marker-active');
      if(i===idx){
        bubble.classList.add('marker-active');
        el.style.display='';
      }else if(mCoord===activeCoord){
        el.style.display='none';
      }else{
        bubble.classList.add('marker-dimmed');
        el.style.display='';
      }
    });
  }

  // 景点标记和路线（当天所有景点显示在地图上）
  let spotMarkers=[];
  let spotRouteLine=null;

  function showDaySpots(idx){
    spotMarkers.forEach(m=>window.map.removeLayer(m));
    spotMarkers=[];
    if(spotRouteLine){window.map.removeLayer(spotRouteLine);spotRouteLine=null;}

    const d=days[idx];
    if(!d||d.route.km==='—')return;

    const spots=d.spots;
    if(spots.length<2)return;

    const center=d.coord;
    const radius=0.03;
    const routeCoords=[center];

    spots.forEach((s,i)=>{
      const angle=(2*Math.PI*i/spots.length)-Math.PI/2;
      const r=radius*(0.6+Math.random()*0.4);
      const lat=center[0]+r*Math.cos(angle);
      const lng=center[1]+r*Math.sin(angle)*1.5;
      routeCoords.push([lat,lng]);

      // 有图片用图片气泡，没有用emoji
      const hasImg=s.img;
      const spotIcon=L.divIcon({
        className:'spot-marker',
        html:hasImg
          ?`<div class="spot-bubble"><img class="spot-img" src="${s.img}" alt=""><div class="spot-label">${s.name}</div></div>`
          :`<div class="spot-pin" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4)">${s.icon}</div>`,
        iconSize:hasImg?[60,70]:[28,28],iconAnchor:hasImg?[30,70]:[14,28],popupAnchor:hasImg?[0,-72]:[0,-30]
      });
      const m=L.marker([lat,lng],{icon:spotIcon}).addTo(window.map);
      m.bindPopup(`<div style="font-family:'Noto Sans SC',sans-serif;padding:2px 4px;font-size:13px"><b>${s.icon} ${s.name}</b><br><span style="color:#666;font-size:12px">${s.desc}</span></div>`,{className:'custom-popup',maxWidth:220});
      spotMarkers.push(m);
    });

    // 画景点间连线
    spotRouteLine=L.polyline(routeCoords,{color:d.color,weight:3,opacity:.5,dashArray:'8,6',smoothFactor:1}).addTo(window.map);
  }

  function clearDaySpots(){
    spotMarkers.forEach(m=>window.map.removeLayer(m));
    spotMarkers=[];
    if(spotRouteLine){window.map.removeLayer(spotRouteLine);spotRouteLine=null;}
  }
  const heroShowcase=document.getElementById('mHeroShowcase');
  const heroLabel=document.getElementById('mHeroLabel');
  function updateHeroImage(idx){
    const d=days[idx];
    if(!d)return;
    // 移除旧图片
    const oldImgs=heroShowcase.querySelectorAll('.m-hero-img');
    // 加载新图片
    const img=document.createElement('img');
    img.className='m-hero-img hidden';
    img.src=d.image;
    img.alt=d.title;
    img.onload=()=>{
      heroShowcase.appendChild(img);
      requestAnimationFrame(()=>{
        oldImgs.forEach(o=>o.remove());
        img.classList.remove('hidden');
        img.classList.add('active');
      });
    };
    // 更新标签
    heroLabel.querySelector('span').textContent=d.title;
  }

  // 渲染某天的时间轴
  function renderDay(idx){
    const d=days[idx];
    if(!d)return;
    let html='';

    // 每日标题
    html+=`<div class="m-day-header"><h3>${d.title}</h3><span class="m-date">${d.date}</span></div>`;

    // 路线摘要
    if(d.route.km!=='—'){
      html+=`<div class="m-route"><i class="fas fa-car"></i><span>${d.route.from} → ${d.route.to}</span><span class="m-km">${d.route.km}</span><span style="color:#94a3b8">· ${d.route.hours}</span></div>`;
    }

    // 时间轴
    html+='<div class="m-timeline">';
    d.spots.forEach((s,i)=>{
      const isLast=i===d.spots.length-1&&!d.hotel&&!d.food;
      const hasImg=s.img;
      html+=`<div class="m-node">
        <div class="m-axis">
          <div class="m-dot" style="background:${d.color}">${i+1}</div>
          ${!isLast?'<div class="m-line"></div>':''}
        </div>
        <div class="m-card" onclick="window.mShowDetail(${idx})">
          ${hasImg?`<img class="m-card-img" src="${s.img}" alt="">`:''}
          <div class="m-card-text">
            <div class="m-card-title">${s.icon} ${s.name}</div>
            <div class="m-card-desc">${s.desc}</div>
          </div>
        </div>
      </div>`;
    });

    // 酒店信息
    if(d.hotel){
      const isBooked=!!d.hotelBooked;
      html+=`<div class="m-node">
        <div class="m-axis">
          <div class="m-dot" style="background:${isBooked?'#22c55e':'#64748b'}"><i class="fas fa-${isBooked?'check':'bed'}" style="font-size:12px"></i></div>
          ${d.food?'<div class="m-line"></div>':''}
        </div>
        <div class="m-info-card hotel">
          <div class="m-info-label"><i class="fas fa-hotel"></i> ${isBooked?'已定酒店':'住宿推荐'}</div>
          <div class="m-info-text">${d.hotel}</div>
          ${isBooked?`<div class="m-booked"><i class="fas fa-check-circle"></i> ${d.hotelBooked.name} · ${d.hotelBooked.room}</div>`:''}
        </div>
      </div>`;
    }

    // 美食信息
    if(d.food){
      html+=`<div class="m-node">
        <div class="m-axis">
          <div class="m-dot" style="background:#ef4444"><i class="fas fa-utensils" style="font-size:12px"></i></div>
        </div>
        <div class="m-info-card food">
          <div class="m-info-label"><i class="fas fa-utensils"></i> 美食推荐</div>
          <div class="m-info-text">${d.food}</div>
        </div>
      </div>`;
    }

    html+='</div>';

    // 温馨提示
    if(d.tips){
      html+=`<div class="m-tip"><i class="fas fa-lightbulb"></i>${d.tips}</div>`;
    }

    contentEl.innerHTML=html;
    contentEl.scrollTop=0;
  }

  // 显示详情弹窗
  window.mShowDetail=function(dayIdx){
    const d=days[dayIdx];
    if(!d)return;
    detailHero.style.backgroundImage=`url('${d.image}')`;
    detailHeroInfo.innerHTML=`<h2>${d.title}</h2><div class="sub">${d.day} · ${d.date}</div>`;

    let body='';
    if(d.route.km!=='—'){
      body+=`<div class="m-detail-section"><div class="m-route"><i class="fas fa-car"></i><span>${d.route.from} → ${d.route.to}</span><span class="m-km">${d.route.km}</span><span style="color:#94a3b8">· ${d.route.hours}</span></div></div>`;
    }
    body+=`<div class="m-detail-section"><h3><i class="fas fa-map-marked-alt"></i> 景点亮点</h3>`;
    d.spots.forEach(s=>{
      body+=`<div class="m-card" style="cursor:default;margin-bottom:8px"><div class="m-card-title">${s.icon} ${s.name}</div><div class="m-card-desc">${s.desc}</div></div>`;
    });
    body+='</div>';
    if(d.hotel){
      const isBooked=!!d.hotelBooked;
      body+=`<div class="m-detail-section"><div class="m-info-card hotel"><div class="m-info-label"><i class="fas fa-hotel"></i> ${isBooked?'已定酒店':'住宿推荐'}</div><div class="m-info-text">${d.hotel}</div>${isBooked?`<div class="m-booked"><i class="fas fa-check-circle"></i> ${d.hotelBooked.name} · ${d.hotelBooked.room}</div>`:''}</div></div>`;
    }
    if(d.food){
      body+=`<div class="m-detail-section"><div class="m-info-card food"><div class="m-info-label"><i class="fas fa-utensils"></i> 美食推荐</div><div class="m-info-text">${d.food}</div></div></div>`;
    }
    if(d.tips){
      body+=`<div class="m-detail-section"><div class="m-tip"><i class="fas fa-lightbulb"></i>${d.tips}</div></div>`;
    }
    detailBody.innerHTML=body;

    overlay.classList.add('show');
    detailPanel.classList.add('show');
    document.body.style.overflow='hidden';
  };

  // 关闭详情
  function closeMobileDetail(){
    overlay.classList.remove('show');
    detailPanel.classList.remove('show');
    document.body.style.overflow='';
  }
  detailClose.addEventListener('click',closeMobileDetail);
  overlay.addEventListener('click',closeMobileDetail);

  // Bottom Sheet 手势控制: collapsed ↔ peek ↔ expanded
  (function(){
    const handle=document.getElementById('mHandle');
    const content=document.getElementById('mContent');
    let startY=0,dragging=false,state='peek';

    function getState(){
      if(sheet.classList.contains('expanded'))return 'expanded';
      if(sheet.classList.contains('collapsed'))return 'collapsed';
      return 'peek';
    }
    function setState(s){
      sheet.classList.remove('expanded','collapsed');
      if(s==='expanded')sheet.classList.add('expanded');
      if(s==='collapsed')sheet.classList.add('collapsed');
      state=s;
    }

    // 所有手势从 handle 或 content 区域触发
    function onTouchStart(e){
      // 如果内容区在滚动中且不在顶部，不拦截
      if(e.target.closest('.m-content')&&content.scrollTop>5)return;
      startY=e.touches[0].clientY;
      dragging=true;
      state=getState();
      sheet.style.transition='none';
    }
    function onTouchMove(e){
      if(!dragging)return;
      const dy=e.touches[0].clientY-startY;
      const vh=window.innerHeight;
      const peekH=vh*.65;
      const expandedH=vh*.92;
      const collapsedH=52;

      if(state==='collapsed'){
        // 收起态：只能上拉到peek
        if(dy<0){
          const h=Math.min(peekH,collapsedH+Math.abs(dy));
          sheet.style.height=h+'px';
        }
      }else if(state==='peek'){
        // 半开态：上拉到expanded，下拉到collapsed
        if(dy<0){
          const h=Math.min(expandedH,peekH+Math.abs(dy)*.6);
          sheet.style.height=h+'px';
        }else{
          const h=Math.max(collapsedH,peekH-dy*.6);
          sheet.style.height=h+'px';
        }
      }else{
        // 全开态：只能下拉到peek
        if(dy>0){
          const h=Math.max(peekH,expandedH-dy*.6);
          sheet.style.height=h+'px';
        }
      }
    }
    function onTouchEnd(e){
      if(!dragging)return;
      dragging=false;
      sheet.style.transition='';
      sheet.style.height='';
      const dy=e.changedTouches[0].clientY-startY;
      const threshold=50;

      if(state==='collapsed'){
        if(dy<-threshold)setState('peek');
      }else if(state==='peek'){
        if(dy<-threshold)setState('expanded');
        else if(dy>threshold)setState('collapsed');
      }else{
        if(dy>threshold)setState('peek');
      }
    }

    handle.addEventListener('touchstart',onTouchStart,{passive:true});
    handle.addEventListener('touchmove',onTouchMove,{passive:true});
    handle.addEventListener('touchend',onTouchEnd,{passive:true});
    content.addEventListener('touchstart',onTouchStart,{passive:true});
    content.addEventListener('touchmove',onTouchMove,{passive:true});
    content.addEventListener('touchend',onTouchEnd,{passive:true});

    // 左右滑动切换Tab（只移动内容区，Tab和标题不动）
    (function(){
      let sx=0,sy=0,swiping=false,locked=false;

      content.addEventListener('touchstart',e=>{
        sx=e.touches[0].clientX;sy=e.touches[0].clientY;
        swiping=true;locked=false;
      },{passive:true});

      content.addEventListener('touchmove',e=>{
        if(!swiping||locked)return;
        const dx=e.touches[0].clientX-sx;
        const dy=Math.abs(e.touches[0].clientY-sy);
        if(dy>12&&Math.abs(dx)<12){locked=true;return;}
        if(Math.abs(dx)>10){
          let offset=dx;
          if((activeDay===0&&dx>0)||(activeDay===days.length-1&&dx<0)){
            offset=dx*0.2;
          }
          const pct=(offset/window.innerWidth)*100;
          content.style.transition='none';
          content.style.transform=`translateX(${pct}%)`;
        }
      },{passive:true});

      content.addEventListener('touchend',e=>{
        if(!swiping||locked){
          swiping=false;
          content.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
          content.style.transform='';
          setTimeout(()=>{content.style.transition='';},300);
          return;
        }
        const dx=e.changedTouches[0].clientX-sx;
        swiping=false;

        const threshold=window.innerWidth*0.2;
        let shouldSwitch=false;
        if(dx<-threshold&&activeDay<days.length-1){shouldSwitch=true;switchDay(activeDay+1);}
        else if(dx>threshold&&activeDay>0){shouldSwitch=true;switchDay(activeDay-1);}

        if(!shouldSwitch){
          content.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
          content.style.transform='';
          setTimeout(()=>{content.style.transition='';},300);
        }
      },{passive:true});
    })();

    // 点击手柄切换
    handle.addEventListener('click',()=>{
      const s=getState();
      if(s==='collapsed')setState('peek');
      else if(s==='peek')setState('expanded');
      else setState('collapsed');
    });
  })();

  // 详情面板拖拽关闭
  (function(){
    let startY=0,dragging=false;
    detailPanel.addEventListener('touchstart',e=>{
      if(detailBody.scrollTop>5)return;
      startY=e.touches[0].clientY;dragging=true;
      detailPanel.style.transition='none';
    },{passive:true});
    detailPanel.addEventListener('touchmove',e=>{
      if(!dragging)return;
      const dy=e.touches[0].clientY-startY;
      if(dy>0)detailPanel.style.transform=`translateY(${dy}px)`;
    },{passive:true});
    detailPanel.addEventListener('touchend',e=>{
      if(!dragging)return;
      dragging=false;
      detailPanel.style.transition='';
      const dy=e.changedTouches[0].clientY-startY;
      if(dy>100)closeMobileDetail();
      else detailPanel.style.transform='';
    },{passive:true});
  })();

  // 初始化第一天
  renderDay(0);
  updateHeroImage(0);
  highlightMarker(0);
  showDaySpots(0);
})();

// === PWA 离线缓存 ===
// 方式1: Service Worker（推荐，HTTP/HTTPS 下可用）
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='xinjiang-trip-v1';
    const ASSETS=['./','https://unpkg.com/leaflet@1.9.4/dist/leaflet.css','https://unpkg.com/leaflet@1.9.4/dist/leaflet.js','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'];
    self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).then(()=>self.skipWaiting()))});
    self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});
    self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone))}return res}).catch(()=>caches.match('./'))))});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'}).catch(()=>{});
}

// 方式2: localStorage 兜底（微信/小程序/浏览器都能用）
try{
  const html=document.documentElement.outerHTML;
  localStorage.setItem('xinjiang_trip_cache',html);
  localStorage.setItem('xinjiang_trip_cache_time',Date.now());
}catch(e){}
// 离线时如果网络请求失败，尝试从缓存恢复
window.addEventListener('load',()=>{
  if(!navigator.onLine){
    const cached=localStorage.getItem('xinjiang_trip_cache');
    if(cached&&document.documentElement.outerHTML.length<1000){
      document.open();document.write(cached);document.close();
    }
  }
});

// 离线状态提示
function updateOnlineStatus(){
  const bar=document.getElementById('offlineBar');
  if(bar) bar.classList.toggle('show',!navigator.onLine);
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);
updateOnlineStatus();

// 手动保存到手机（点击按钮触发）
function saveOffline(){
  try{
    const html=document.documentElement.outerHTML;
    localStorage.setItem('xinjiang_trip_cache',html);
    localStorage.setItem('xinjiang_trip_cache_time',new Date().toLocaleString('zh-CN'));
    const btn=document.getElementById('cacheBtn');
    btn.classList.add('saved');
    btn.innerHTML='<i class="fas fa-check"></i> <span>已保存！断网也能看</span>';
    setTimeout(()=>{btn.style.opacity='0';btn.style.pointerEvents='none'},2000);
  }catch(e){
    alert('保存失败，请尝试用浏览器打开后保存');
  }
}

// 检查是否已缓存，更新按钮状态
(function(){
  const cached=localStorage.getItem('xinjiang_trip_cache');
  const cacheTime=localStorage.getItem('xinjiang_trip_cache_time');
  if(cached&&cacheTime){
    const btn=document.getElementById('cacheBtn');
    if(btn){
      btn.classList.add('saved');
      btn.innerHTML=`<i class="fas fa-check"></i> <span>已保存 (${cacheTime})</span>`;
    }
  }
})();

<style>
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:0 10px 40px rgba(0,0,0,.2)!important}
.custom-popup .leaflet-popup-content{margin:14px 18px!important}
.leaflet-control-zoom a{background:#fff!important;color:#333!important;border:1px solid rgba(0,0,0,.1)!important}
.leaflet-tile-pane{filter:none}
/* 地图标记气泡（参考圆周旅途样式） */
.marker-bubble{
  width:48px;position:relative;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .3s,opacity .3s;
}
.marker-img{
  width:48px;height:48px;border-radius:14px;object-fit:cover;
  border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.3);
}
.marker-num{
  position:absolute;top:-5px;right:-5px;
  width:20px;height:20px;border-radius:50%;
  font-size:10px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);
}
.marker-dimmed{opacity:.3!important;transform:scale(.7)!important}
.marker-active{transform:scale(1.2)!important;z-index:9999!important}
.marker-active .marker-img{box-shadow:0 4px 24px rgba(0,0,0,.4);border-color:var(--mc,#0ea5e9);border-width:3px}
.spot-pin{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25);
  border:2px solid #fff;transition:transform .2s;
}
.spot-pin:active{transform:scale(1.2)}
/* 景点图片气泡 */
.spot-bubble{
  width:60px;display:flex;flex-direction:column;align-items:center;
}
.spot-img{
  width:52px;height:52px;border-radius:14px;object-fit:cover;
  border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.3);
}
.spot-label{
  margin-top:4px;padding:2px 8px;
  background:#fff;border-radius:8px;
  font-size:10px;font-weight:600;color:#334155;
  box-shadow:0 1px 6px rgba(0,0,0,.12);
  white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;
  text-align:center;
}
</style>
</body>
</html>
